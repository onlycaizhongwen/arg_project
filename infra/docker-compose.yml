services:
  api:
    build:
      context: ../services/api
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
    container_name: rag-cleaning-api
    environment:
      APP_ENV: local
      APP_NAME: rag-cleaning-api
      APP_VERSION: 0.1.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_cleaning
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: rag
      RABBITMQ_PASSWORD: rag
      RABBITMQ_QUEUE: cleaning.jobs
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: rag
      MINIO_SECRET_KEY: rag_password
      MINIO_BUCKET: rag-documents
      MINIO_SECURE: "false"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: rag_chunks
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mock-embedding}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_OUTPUT_TYPE: ${EMBEDDING_OUTPUT_TYPE:-dense}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-disabled}
      RERANK_MODEL: ${RERANK_MODEL:-mock-reranker}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RERANK_TIMEOUT_SECONDS: ${RERANK_TIMEOUT_SECONDS:-5}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
      AUTH_CONTEXT_MODE: ${AUTH_CONTEXT_MODE:-local}
      AUTH_TRUSTED_HEADER_ENABLED: ${AUTH_TRUSTED_HEADER_ENABLED:-true}
      AUTH_REQUIRE_ACTOR: ${AUTH_REQUIRE_ACTOR:-false}
      AUTH_REQUIRE_TENANT: ${AUTH_REQUIRE_TENANT:-false}
      AUTH_DEFAULT_REQUEST_SOURCE: ${AUTH_DEFAULT_REQUEST_SOURCE:-api}
      AUTH_DEFAULT_PERMISSION_TAGS: ${AUTH_DEFAULT_PERMISSION_TAGS:-public}
      AUTH_EMPTY_PERMISSION_POLICY: ${AUTH_EMPTY_PERMISSION_POLICY:-public_only}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build:
      context: ../services/worker
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
    container_name: rag-cleaning-worker
    environment:
      APP_ENV: local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_cleaning
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: rag
      RABBITMQ_PASSWORD: rag
      RABBITMQ_QUEUE: cleaning.jobs
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: rag
      MINIO_SECRET_KEY: rag_password
      MINIO_BUCKET: rag-documents
      MINIO_SECURE: "false"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: rag_chunks
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mock-embedding}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_OUTPUT_TYPE: ${EMBEDDING_OUTPUT_TYPE:-dense}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  reranker:
    build:
      context: ../services/reranker
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
    container_name: rag-bge-reranker
    profiles:
      - reranker
    environment:
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-base}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HOME: /models/huggingface
    ports:
      - "8010:8010"
    volumes:
      - hf-models:/models/huggingface

  postgres:
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    container_name: rag-cleaning-postgres
    environment:
      POSTGRES_DB: rag_cleaning
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_cleaning"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-docker.m.daocloud.io/library/rabbitmq:3.13-management-alpine}
    container_name: rag-cleaning-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rag
      RABBITMQ_DEFAULT_PASS: rag
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: ${MINIO_IMAGE:-docker.m.daocloud.io/minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: rag-cleaning-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rag
      MINIO_ROOT_PASSWORD: rag_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: ${QDRANT_IMAGE:-docker.m.daocloud.io/qdrant/qdrant:v1.18.0}
    container_name: rag-cleaning-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c '</dev/tcp/localhost/6333'"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
  qdrant-data:
  hf-models:
